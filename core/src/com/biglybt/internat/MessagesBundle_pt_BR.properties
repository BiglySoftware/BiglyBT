ConfigView.section.connection.advanced.mtu.tooltip=Tamanho m\u00E1ximo de um pacote que pode ser transferido em um quadro pela rede. \nO {base.product.name} usa MTU-40 (MSS) para otimiza\u00E7\u00F5es de payload de pacotes de upload. \nValores recomendados: \n576 - conex\u00F5es discadas; \n1492 - conex\u00F5es de banda larga PPPoE; \n1500 - Ethernet, DSL e conex\u00F5es de banda larga por cabo
ConfigView.section.connection.advanced.SO_RCVBUF=Tamanho do SO_RCVBUF do socket [0: usar padr\u00E3o do SO]
ConfigView.section.connection.advanced.SO_RCVBUF.tooltip=O {base.product.name} define o valor padr\u00E3o do socket SO_RCVBUF (em bytes), ou seja, o tamanho e a escala da janela de recebimento TCP. \nPor padr\u00E3o, o {base.product.name} deixa esse valor n\u00E3o definido, usando os padr\u00F5es do sistema operacional subjacente. \nOBSERVA\u00C7\u00C3O: o Linux duplica o valor fornecido.
ConfigView.section.connection.advanced.SO_SNDBUF=Tamanho do SO_SNDBUF do socket [0: usar padr\u00E3o do SO]
ConfigView.section.connection.advanced.SO_SNDBUF.tooltip=O {base.product.name} define o valor padr\u00E3o do socket SO_SNDBUF (em bytes), ou seja, o tamanho da janela de envio TCP. \nPor padr\u00E3o, o {base.product.name} deixa esse valor n\u00E3o definido, usando os padr\u00F5es do sistema operacional subjacente. \nOBSERVA\u00C7\u00C3O: o Linux duplica o valor fornecido.
ConfigView.section.connection.advanced.IPDiffServ=Valor DiffServ do pacote de sa\u00EDda (campo TOS)
ConfigView.section.connection.advanced.IPDiffServ.tooltip=O {base.product.name} define a parte DiffServ do campo tipo de servi\u00E7o (TOS) no cabe\u00E7alho IP para pacotes de sa\u00EDda. \nValores hexadecimais podem ser especificados com o prefixo '0x', por exemplo, 0x10. Por padr\u00E3o, o {base.product.name} deixa esse valor n\u00E3o definido, usando os padr\u00F5es do sistema operacional subjacente. \nOBSERVA\u00C7\u00C3O: implementa\u00E7\u00F5es de rede subjacentes podem ignorar esse valor, portanto esta op\u00E7\u00E3o depende muito das vers\u00F5es do SO e do JRE.
