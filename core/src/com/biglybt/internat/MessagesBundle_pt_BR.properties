configureWizard.transfer2.mselect.info=As entradas xxx/<valor> indicam uma velocidade de conex\u00E3o de envio de <valor> bits por segundo. Por exemplo, se voc\u00EA tem uma conex\u00E3o ADSL com 768 Kbps de velocidade de download e 384 Kbps de upload, selecione 'xxx/384 kbit/s'. \nArredonde para baixo at\u00E9 o valor mais pr\u00F3ximo caso sua velocidade exata n\u00E3o esteja listada.
