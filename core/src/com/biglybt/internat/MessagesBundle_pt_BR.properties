ConfigView.section.security.toolsinfo=Arquivos JAR assinados s\u00E3o usados para ajudar alguns plugins, por exemplo o Swing Web Interface (quando configurado para faz\u00EA-lo).\nPara assinar arquivos JAR \u00E9 necess\u00E1rio ter accesso ao arquivo 'tools.jar' que vem com a instala\u00E7\u00E3o do Sun JDK (n\u00E3o do JRE).\nSe voc\u00EA s\u00F3 tiver instalado o JRE ent\u00E3o por favor instale o JDK.\nNormalmente o {base.product.name} pode achar o arquivo para voc\u00EA. Entretanto, se isto falhar, voc\u00EA pode explicitamente definir o diret\u00F3rio contendo-o aqui.
