configureWizard.transfer2.hint=Definir o limite de envio muito alto ou muito baixo afetar\u00E1 o desempenho do download!
configureWizard.transfer2.message=O Bittorrent \u00E9 baseado em um protocolo de reciprocidade \u2014 em geral, quanto mais r\u00E1pido voc\u00EA envia, mais r\u00E1pido voc\u00EA baixa. \n\nPortanto, para baixar rapidamente e obter uma boa propor\u00E7\u00E3o de compartilhamento, voc\u00EA precisa de uma boa velocidade de envio. No entanto, se voc\u00EA enviar r\u00E1pido demais para a sua conex\u00E3o, pode sobrecarreg\u00E1-la, resultando em menor desempenho geral e impacto em outros aplicativos que disputam recursos de rede.\n\nPor isso, \u00E9 importante definir um limite de envio equilibrado. \n\nUse este painel para selecionar sua velocidade m\u00E1xima de envio. O {base.product.name} ent\u00E3o definir\u00E1 um limite baseado nisso para otimizar sua experi\u00EAncia.
