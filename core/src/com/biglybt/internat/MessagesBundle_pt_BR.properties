ConfigView.section.connection.network.max.simultaneous.connect.attempts=Tentativas m\u00E1ximas de conex\u00F5es de sa\u00EDda simult\u00E2neas
ConfigView.section.connection.network.max.simultaneous.connect.attempts.tooltip=N\u00FAmero m\u00E1ximo de novas tentativas de estabelecimento de conex\u00F5es de sa\u00EDda que o {base.product.name} deve fazer em um determinado momento. \nOBSERVA\u00C7\u00C3O: O Windows XP Service Pack 2 (SP2) imp\u00F5e um limite de 10 tentativas de conex\u00E3o simult\u00E2neas em todo o sistema. \nO valor padr\u00E3o \u00E9 8.
ConfigView.section.file.perf.cache.size.explain=O cache \u00E9 usado para reduzir leituras e grava\u00E7\u00F5es em disco. A menos que voc\u00EA esteja usando a op\u00E7\u00E3o Java '-XX:MaxDirectMemorySize' para definir explicitamente a mem\u00F3ria dispon\u00EDvel para uso de cache e E/S de rede, mantenha este valor pelo menos %1 abaixo do tamanho m\u00E1ximo da sua VM. O tamanho m\u00E1ximo atual da VM \u00E9 %2. Para instru\u00E7\u00F5es sobre como alterar isso, consulte MemoryUsage na wiki em %3. O uso de configura\u00E7\u00F5es inadequadas resultar\u00E1 em erros de "falta de mem\u00F3ria". Mais de 32MB de cache provavelmente \u00E9 excessivo e est\u00E1 limitado a um m\u00E1ximo de 2000MB no c\u00F3digo.
